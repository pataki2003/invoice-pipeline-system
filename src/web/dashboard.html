<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Invoice Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background: #f3f3f3;
            text-align: left;
        }

        .row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        select,
        button {
            padding: 6px 10px;
        }

        .pill {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 999px;
            background: #eee;
        }

        pre {
            background: #111;
            color: #0f0;
            padding: 12px;
            overflow: auto;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            align-items: center;
            margin: 12px 0 14px;
        }

        .group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .group label {
            font-size: 13px;
            color: #444;
            min-width: 85px;
        }

        select,
        button,
        input {
            height: 32px;
            border: 1px solid #d0d0d0;
            border-radius: 8px;
            padding: 0 10px;
            background: #fff;
        }

        button {
            cursor: pointer;
            background: #f6f6f6;
        }

        button:hover:enabled {
            background: #ececec;
        }

        .pill {
            border: 1px solid #ddd;
            background: #fafafa;
            max-width: 520px;
            /* itt szabályozod mennyire férjen el */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            /* ... */
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 12px;
            padding: 6px 10px;
        }

        @media (max-width: 900px) {
            .pill {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <h1>Invoice Admin</h1>
    <div id="banner"
        style="display:none; padding:10px; margin:10px 0; border:1px solid #f5c2c7; background:#f8d7da; color:#842029;">
    </div>

    <div class="toolbar">
        <div class="group">
            <label>Data source:</label>
            <select id="source">
                <option value="local">Local (SQLite)</option>
                <option value="db2">DB2 (IBM i)</option>
            </select>

            <label>Status filter:</label>
            <select id="statusFilter">
                <option value="">(all)</option>
                <option>READY</option>
                <option>REJECTED</option>
                <option>VALIDATED</option>
                <option>ARCHIVED</option>
                <option>ERROR</option>
            </select>

        </div>

        <div class="group">
            <button onclick="loadInvoices()">Refresh</button>
            <button onclick="runPipeline()">Run pipeline</button>
            <button onclick="runIbmi()">Run IBM i (stub)</button>
            <button onclick="ibmiDiscovery()">IBM i discovery</button>
        </div>

        <span class="pill" id="metrics" title="metrics">metrics: ...</span>
    </div>

    <div class="row">
        <label>Manual test:</label>
        <input id="manualId" placeholder="invoice id" style="padding:6px 10px; width:120px;">
        <input id="manualStatus" placeholder="status (e.g. READY)" style="padding:6px 10px; width:180px;">
        <button onclick="manualUpdate()">Send</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Timestamp</th>
                <th>Original</th>
                <th>Status</th>
                <th>Final</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <h3>Selected invoice history</h3>
    <pre id="history">(click "History")</pre>

    <script>
        const apiBase = ""; // same host

        function showError(msg) {
            const b = document.getElementById("banner");
            b.style.display = "block";
            b.textContent = msg;
        }

        function clearError() {
            const b = document.getElementById("banner");
            b.style.display = "none";
            b.textContent = "";
        }

        const transitions = {
            "READY": ["VALIDATED", "ERROR"],
            "VALIDATED": ["ARCHIVED", "ERROR"],
            "ERROR": ["VALIDATED"],
            "ARCHIVED": []
        };

        function canTransition(fromStatus, toStatus) {
            const allowed = transitions[fromStatus] || [];
            return allowed.includes(toStatus);
        }


        async function loadMetrics(isDb2) {
            const el = document.getElementById("metrics");

            try {
                if (isDb2) {
                    const r = await fetch(`${apiBase}/ibmi/metrics`);
                    const data = await r.json();
                    const txt = "metrics: " + JSON.stringify(data);
                    el.innerText = txt;
                    el.title = txt;
                    return;
                }

                const r = await fetch(`${apiBase}/metrics`);
                const data = await r.json();
                const txt = "metrics: " + JSON.stringify(data);
                el.innerText = txt;
                el.title = txt;
            } catch (e) {
                showError("Failed to load metrics: " + e.message);
            }
        }

        async function loadInvoices() {
            clearError();

            const source = document.getElementById("source").value;   // "local" | "db2"
            const isDb2 = (source === "db2");

            const status = document.getElementById("statusFilter").value; // "", "READY", ...
            const base = isDb2 ? "/ibmi" : ""; // DB2: /ibmi/invoices, Local: /invoices

            const url =
                status
                    ? `${apiBase}${base}/invoices?status=${encodeURIComponent(status)}`
                    : `${apiBase}${base}/invoices`;

            try {
                const r = await fetch(url);
                const items = await r.json();

                const tbody = document.getElementById("tbody");
                tbody.innerHTML = "";

                for (const inv of items) {
                    const ts = inv.timestamp || inv.created_at || "";

                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                <td>${inv.id}</td>
                <td>${ts}</td>
                <td>${inv.original_name}</td>
                <td>${inv.status}</td>
                <td>${inv.final_name}</td>
                <td>
                    <button ${(!isDb2 && canTransition(inv.status, "VALIDATED")) ? "" : "disabled"} data-id="${inv.id}" data-action="VALIDATED">VALIDATE</button>
                    <button ${(!isDb2 && canTransition(inv.status, "ARCHIVED")) ? "" : "disabled"} data-id="${inv.id}" data-action="ARCHIVED">ARCHIVE</button>
                    <button ${(!isDb2 && canTransition(inv.status, "ERROR")) ? "" : "disabled"} data-id="${inv.id}" data-action="ERROR">ERROR</button>
                    <button ${isDb2 ? "disabled" : ""} data-id="${inv.id}" data-action="history">History</button>
                </td>
            `;
                    tbody.appendChild(tr);
                }

                await loadMetrics(isDb2);
            } catch (e) {
                showError("Failed to load invoices: " + e.message);
            }
        }

        async function setStatus(id, status) {
            clearError();

            const source = document.getElementById("source").value;
            const isDb2 = (source === "db2");



            try {
                const url = isDb2
                    ? `${apiBase}/ibmi/invoices/${id}/status?status=${encodeURIComponent(status)}`
                    : `${apiBase}/invoices/${id}/status?status=${encodeURIComponent(status)}`;

                const r = await fetch(url, { method: "PATCH" });
                const data = await r.json();

                if (!r.ok || data.error) {
                    showError(`Update failed for invoice ${id}: ${JSON.stringify(data)}`);
                    return;
                }

                await loadInvoices();
            } catch (e) {
                showError("Failed to update status: " + e.message);
            }
        }

        async function manualUpdate() {
            const id = document.getElementById("manualId").value.trim();
            const status = document.getElementById("manualStatus").value.trim();
            if (!id || !status) {
                showError("Manual test: please fill invoice id and status");
                return;
            }
            await setStatus(id, status);
        }

        async function showHistory(id) {
            try {
                const r = await fetch(`${apiBase}/invoices/${id}/history`);
                const data = await r.json();
                document.getElementById("history").innerText = JSON.stringify(data, null, 2);
            } catch (e) {
                showError("Failed to load history: " + e.message);
            }
        }

        async function runPipeline() {
            clearError();
            try {
                const r = await fetch("/pipeline/run", { method: "POST" });
                const data = await r.json();
                if (!r.ok || data.error) {
                    showError(JSON.stringify(data));
                    return;
                }
                await loadInvoices();
            } catch (e) {
                showError("Failed to run pipeline: " + e.message);
            }
        }

        async function runIbmi() {
            clearError();
            try {
                const r = await fetch("/ibmi/run", { method: "POST" });
                const data = await r.json();
                if (!r.ok || data.error) {
                    showError(JSON.stringify(data));
                }
            } catch (e) {
                showError("Failed to run IBM i: " + e.message);
            }
        }

        async function ibmiDiscovery() {
            clearError();
            try {
                const r = await fetch("/ibmi/discovery");
                const data = await r.json();
                document.getElementById("history").innerText = JSON.stringify(data, null, 2);
            } catch (e) {
                showError("Failed to run IBM i discovery: " + e.message);
            }
        }

        // Event listeners
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("tbody").addEventListener("click", (e) => {
                if (e.target.tagName === "BUTTON") {
                    const id = e.target.dataset.id;
                    const action = e.target.dataset.action;
                    if (action === "history") {
                        showHistory(id);
                    } else {
                        setStatus(id, action);
                    }
                }
            });

            document.getElementById("source").addEventListener("change", loadInvoices);
            document.getElementById("statusFilter").addEventListener("change", loadInvoices);
            loadInvoices();
        });
    </script>
</body>

</html>
